name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Reintentos ante fallos de red transitorios (ECONNRESET) del registro npm.
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci --fetch-retries=5 --fetch-retry-mintimeout=10000 --fetch-retry-maxtimeout=60000 && exit 0
            echo "npm ci falló (intento $i); reintentando en 15s…" >&2
            sleep 15
          done
          echo "npm ci falló tras 3 intentos" >&2
          exit 1

      # Genera src/data/{grammar,cultural}/<lang>.js a partir de los datos
      # multi-idioma (esos archivos están gitignorados — los crea cada build).
      - name: Generate i18n data
        run: node scripts/split-i18n-data.mjs

      # Copia los datos de trazos de HanziWriter usados a public/hanzi-data/
      # (gitignorado). Sin esto, las animaciones de trazos no cargarían.
      - name: Copy HanziWriter stroke data
        run: node scripts/copy-hanzi-data.mjs

      - name: Build
        run: npx vite build --base=/aprende-chino/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4