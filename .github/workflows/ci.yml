name: CI

# Barrera de calidad: lint + tests + build en cada push y pull request.
# El deploy (deploy-pages.yml) sigue corriendo solo en main; esto cubre
# también las ramas y PRs para cazar regresiones antes de fusionar.
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Reintentos ante fallos de red transitorios (ECONNRESET) del registro npm.
      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci --fetch-retries=5 --fetch-retry-mintimeout=10000 --fetch-retry-maxtimeout=60000 && exit 0
            echo "npm ci falló (intento $i); reintentando en 15s…" >&2
            sleep 15
          done
          echo "npm ci falló tras 3 intentos" >&2
          exit 1

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      # Los datos multi-idioma (src/data/{grammar,cultural}/<lang>.js) están
      # gitignorados; el build los necesita generados primero.
      - name: Generate i18n data
        run: node scripts/split-i18n-data.mjs

      - name: Copy HanziWriter stroke data
        run: node scripts/copy-hanzi-data.mjs

      - name: Build
        run: npx vite build
